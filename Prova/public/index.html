<!DOCTYPE html>
<html>
    <head>
        <title>SkyNode Solutions</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <header>
            <h1>SkyNode Solutions</h1>
            <p>Monitor de Infraestrutura do Sistema</p>
        </header>
        <br>
        <br>
        <br>
        <br>
        <div class="cards">
            <div class="card cpu">
             <div class="icon">💻</div>
             <h3>Uso de CPU</h3>
             <div class="value">24<span class="unit">%</span></div>
            </div>

            <div class="card temp">
             <div class="icon">🔥</div>
             <h3>Temperatura</h3>
             <div class="value">55<span class="unit">°C</span></div>
            </div>

            <div class="card ram">
             <div class="icon">🧠</div>
             <h3>Memória RAM</h3>
             <div class="value">4.2<span class="unit">GB</span></div>
            </div>
        </div>
    </body>
</html>
